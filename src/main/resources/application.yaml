spring:
  application:
    name: honda-dealership
  config:
    import: optional:file:.env
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost:3306}/${DB_NAME:honda_test}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.example.honda_dealership: INFO
    org.springframework.web: INFO

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/honda}

app:
  jwt:
    secret: ${JWT_SECRET:c22b54d9690db53324f3d424d21c9c9c3148010e8cfed2563ce631d14e0675e2}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin:
      email: ${SEED_ADMIN_EMAIL:admin@honda.com}
      password: ${SEED_ADMIN_PASSWORD:Admin@123}
    staff:
      email: ${SEED_STAFF_EMAIL:staff@honda.com}
      password: ${SEED_STAFF_PASSWORD:Staff@123}